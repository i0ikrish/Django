{% extends 'base.html' %}

{% block content %}

<div class="card  ">
    <h4>Add Note</h4>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">Save Note</button>
    </form>
</div>

<h4 class="text-center">Your Notes</h4>

{% for note in notes %}
    <div class="card ">
        <div class="card-body">
            <h5>{{ note.title }}</h5>
            <p>{{ note.content }}</p>

            <a href="{% url 'edit_note' note.id %}" class="btn btn-sm btn-warning">Edit</a>
          
        </div>
    </div>
{% empty %}
    <p>No notes yet.</p>
{% endfor %}

{% endblock %}
